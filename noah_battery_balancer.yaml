blueprint:
  name: Noah Battery Balancer 2.28
  description: |
    SOC-Balancing für bis zu 6 Growatt Noah 2000.
    Hysterese-Logik mit max_soc/min_soc Schwellen.
    
    SOC balancing for up to 6 Growatt Noah 2000.
    Hysteresis logic with max_soc/min_soc thresholds.
  
  domain: automation
  source_url: https://github.com/OlliPolli76/home-assistant-blueprints/blob/main/noah_battery_balancer.yaml
  author: OlliPolli
  homeassistant:
    min_version: 2024.1.0

  input:
    # ========== Debug ==========
    debug_enabled:
      name: Debug-Modus
      description: Aktiviert Debug-Logging
      default: false
      selector:
        boolean:

    # ========== Noah Units (1-6) ==========
    noah_1_soc:
      name: Noah 1 - SOC Sensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_1_power:
      name: Noah 1 - Output Power
      selector:
        entity:
          filter:
            - domain: number

    noah_2_soc:
      name: Noah 2 - SOC Sensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_2_power:
      name: Noah 2 - Output Power
      selector:
        entity:
          filter:
            - domain: number

    noah_3_soc:
      name: Noah 3 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_3_power:
      name: Noah 3 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_4_soc:
      name: Noah 4 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_4_power:
      name: Noah 4 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_5_soc:
      name: Noah 5 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_5_power:
      name: Noah 5 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_6_soc:
      name: Noah 6 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_6_power:
      name: Noah 6 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    # ========== SOC Thresholds ==========
    max_soc:
      name: Max SOC (Drosselung)
      description: Drosseln wenn Noah >= diesem Wert
      default: 90
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"

    min_soc:
      name: Min SOC (Freigabe)
      description: Freigeben wenn Noah <= diesem Wert
      default: 85
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"

    # ========== Power Settings ==========
    min_output_power:
      name: Min Output Power (Drosselung)
      default: 0
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"

    max_output_power:
      name: Max Output Power (Normal)
      default: 800
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"

    # ========== Netzbezug Override ==========
    netzbezug_enabled:
      name: Netzbezug-Override aktivieren
      default: false
      selector:
        boolean:

    netzbezug_sensor:
      name: Netzbezug-Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power

    netzbezug_threshold:
      name: Netzbezug-Schwelle (W)
      default: 500
      selector:
        number:
          min: 0
          max: 10000
          step: 50

    netzbezug_duration:
      name: Netzbezug-Verzögerung (s)
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5

    netzbezug_min_soc:
      name: Netzbezug Min SOC (%)
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5

    netzbezug_cooldown_minutes:
      name: Netzbezug Cooldown (Min)
      description: Pausiere Basis-Logik nach DPL Mode Änderung
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1

    # ========== DTU Solar Optimizer ==========
    dtu_enabled:
      name: DTU Solar-Optimizer aktivieren
      default: false
      selector:
        boolean:

    dtu_mode_select:
      name: DTU DPL Mode Select
      description: "0=aktiv, 1=aus, 2=deaktiviert"
      default: []
      selector:
        entity:
          filter:
            - domain: select

    hours_before_sunset:
      name: Stunden vor Sonnenuntergang
      default: 2
      selector:
        number:
          min: 0.5
          max: 6
          step: 0.5

    feed_in_output_power:
      name: Einspeisung Output Power (W)
      default: 400
      selector:
        number:
          min: 0
          max: 800
          step: 50

    # ========== Actions ==========
    actions:
      name: Aktionen
      description: Benachrichtigungen nach Änderungen
      default: []
      selector:
        action: {}

# ========== VARIABLES ==========
variables:
  debug_enabled: !input debug_enabled
  noah_1_soc: !input noah_1_soc
  noah_1_power: !input noah_1_power
  noah_2_soc: !input noah_2_soc
  noah_2_power: !input noah_2_power
  noah_3_soc: !input noah_3_soc
  noah_3_power: !input noah_3_power
  noah_4_soc: !input noah_4_soc
  noah_4_power: !input noah_4_power
  noah_5_soc: !input noah_5_soc
  noah_5_power: !input noah_5_power
  noah_6_soc: !input noah_6_soc
  noah_6_power: !input noah_6_power
  max_soc: !input max_soc
  min_soc: !input min_soc
  min_output_power: !input min_output_power
  max_output_power: !input max_output_power
  netzbezug_enabled: !input netzbezug_enabled
  netzbezug_sensor: !input netzbezug_sensor
  netzbezug_threshold: !input netzbezug_threshold
  netzbezug_duration: !input netzbezug_duration
  netzbezug_min_soc: !input netzbezug_min_soc
  netzbezug_cooldown_minutes: !input netzbezug_cooldown_minutes
  dtu_enabled: !input dtu_enabled
  dtu_mode_select: !input dtu_mode_select
  hours_before_sunset: !input hours_before_sunset
  feed_in_output_power: !input feed_in_output_power
  actions: !input actions

  noah_units: |
    {%- set units = [] -%}
    {%- if noah_1_soc != [] and noah_1_power != [] -%}
      {%- set units = units + [{'soc': noah_1_soc, 'power': noah_1_power, 'name': 'Noah 1'}] -%}
    {%- endif -%}
    {%- if noah_2_soc != [] and noah_2_power != [] -%}
      {%- set units = units + [{'soc': noah_2_soc, 'power': noah_2_power, 'name': 'Noah 2'}] -%}
    {%- endif -%}
    {%- if noah_3_soc != [] and noah_3_power != [] -%}
      {%- set units = units + [{'soc': noah_3_soc, 'power': noah_3_power, 'name': 'Noah 3'}] -%}
    {%- endif -%}
    {%- if noah_4_soc != [] and noah_4_power != [] -%}
      {%- set units = units + [{'soc': noah_4_soc, 'power': noah_4_power, 'name': 'Noah 4'}] -%}
    {%- endif -%}
    {%- if noah_5_soc != [] and noah_5_power != [] -%}
      {%- set units = units + [{'soc': noah_5_soc, 'power': noah_5_power, 'name': 'Noah 5'}] -%}
    {%- endif -%}
    {%- if noah_6_soc != [] and noah_6_power != [] -%}
      {%- set units = units + [{'soc': noah_6_soc, 'power': noah_6_power, 'name': 'Noah 6'}] -%}
    {%- endif -%}
    {{ units }}

  hours_until_sunset: |
    {% set sunset = state_attr('sun.sun', 'next_setting') | as_datetime %}
    {{ (sunset - now()).total_seconds() / 3600 }}

# ========== TRIGGER ==========
trigger:
  - platform: state
    entity_id: !input noah_1_soc
  - platform: state
    entity_id: !input noah_2_soc
  - platform: state
    entity_id: !input noah_3_soc
  - platform: state
    entity_id: !input noah_4_soc
  - platform: state
    entity_id: !input noah_5_soc
  - platform: state
    entity_id: !input noah_6_soc
  - platform: numeric_state
    entity_id: !input netzbezug_sensor
    above: !input netzbezug_threshold
    for:
      seconds: !input netzbezug_duration

condition: []

# ========== ACTIONS ==========
action:
  # Initial variables
  - variables:
      action_type: "no_action"
      changes_made: false
      throttled_units: []
      released_units: []

  # ========== PRIO 1: DTU Solar-Optimizer ==========
  - if:
      - condition: template
        value_template: "{{ dtu_enabled and dtu_mode_select != [] }}"
      - condition: template
        value_template: |
          {% set all_100 = true %}
          {% for unit in noah_units %}
            {% if states(unit.soc) | float(0) < 100 %}
              {% set all_100 = false %}
            {% endif %}
          {% endfor %}
          {{ all_100 }}
      - condition: template
        value_template: "{{ hours_until_sunset > hours_before_sunset }}"
    then:
      - action: select.select_option
        target:
          entity_id: "{{ dtu_mode_select }}"
        data:
          option: "2"
      
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: "{{ noah_units[repeat.index - 1].power }}"
              data:
                value: "{{ feed_in_output_power }}"
      
      - variables:
          action_type: "dtu_solar"
          changes_made: true
      
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions
      
      - stop: "DTU Solar aktiv"

  # ========== DTU Return ==========
  - if:
      - condition: template
        value_template: "{{ dtu_enabled and dtu_mode_select != [] }}"
      - condition: state
        entity_id: !input dtu_mode_select
        state: "2"
      - condition: template
        value_template: |
          {% set any_below_100 = false %}
          {% for unit in noah_units %}
            {% if states(unit.soc) | float(0) < 100 %}
              {% set any_below_100 = true %}
            {% endif %}
          {% endfor %}
          {{ any_below_100 }}
    then:
      - action: select.select_option
        target:
          entity_id: "{{ dtu_mode_select }}"
        data:
          option: "0"
      
      - variables:
          action_type: "dtu_return"
          changes_made: true
      
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

  # ========== PRIO 2: Netzbezug Override ==========
  - if:
      - condition: template
        value_template: "{{ netzbezug_enabled and netzbezug_sensor != [] }}"
      - condition: numeric_state
        entity_id: !input netzbezug_sensor
        above: !input netzbezug_threshold
      - condition: template
        value_template: |
          {% set all_above_min = true %}
          {% for unit in noah_units %}
            {% if states(unit.soc) | float(0) < netzbezug_min_soc %}
              {% set all_above_min = false %}
            {% endif %}
          {% endfor %}
          {{ all_above_min }}
      - condition: template
        value_template: |
          {% if dtu_mode_select == [] %}
            {{ true }}
          {% else %}
            {{ states(dtu_mode_select) != '0' }}
          {% endif %}
    then:
      - if:
          - condition: template
            value_template: "{{ dtu_mode_select != [] }}"
        then:
          - action: select.select_option
            target:
              entity_id: "{{ dtu_mode_select }}"
            data:
              option: "0"
      
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - variables:
                unit_power: "{{ noah_units[repeat.index - 1].power }}"
                current_power: "{{ states(unit_power) | float(0) }}"
            
            - if:
                - condition: template
                  value_template: "{{ current_power != max_output_power }}"
              then:
                - action: number.set_value
                  target:
                    entity_id: "{{ unit_power }}"
                  data:
                    value: "{{ max_output_power }}"
                
                - variables:
                    released_units: "{{ released_units + [noah_units[repeat.index - 1].name] }}"
      
      - variables:
          action_type: "netzbezug_override"
          changes_made: "{{ released_units | length > 0 }}"
      
      - if:
          - condition: template
            value_template: "{{ changes_made and actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions
      
      - stop: "Netzbezug Override aktiv"

  # ========== PRIO 3: Cooldown Check ==========
  - if:
      - condition: template
        value_template: "{{ dtu_mode_select != [] }}"
      - condition: template
        value_template: |
          {% set last_change_raw = state_attr(dtu_mode_select, 'last_changed') %}
          {% if last_change_raw is none %}
            {{ false }}
          {% else %}
            {% set last_change = last_change_raw | as_datetime %}
            {{ (now() - last_change).total_seconds() / 60 < netzbezug_cooldown_minutes }}
          {% endif %}
    then:
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: logbook.log
            data:
              name: Noah Balancer Cooldown
              message: |
                {% set last_change_raw = state_attr(dtu_mode_select, 'last_changed') %}
                {% if last_change_raw is not none %}
                  {% set last_change = last_change_raw | as_datetime %}
                  Cooldown aktiv - DPL Mode geändert vor {{ ((now() - last_change).total_seconds() / 60) | round(1) }} Min
                {% else %}
                  Cooldown aktiv - DPL last_changed nicht verfügbar
                {% endif %}
      
      - stop: "Cooldown aktiv"

  # ========== PRIO 4: Basis-Logik mit Hysterese-Balancing ==========
  
  # Prüfe ob irgendein Noah >= max_soc
  - variables:
      others_above_max: "{{ noah_units | map(attribute='soc') | map('states') | map('float', 0) | select('ge', max_soc) | list | length > 0 }}"
      any_throttled: "{{ noah_units | map(attribute='power') | map('states') | map('float', 0) | select('eq', min_output_power) | list | length > 0 }}"

  # Pro Noah Loop mit 4-Zustands-Logik
  - repeat:
      count: "{{ noah_units | length }}"
      sequence:
        - variables:
            current_noah: "{{ noah_units[repeat.index - 1] }}"
            current_soc: "{{ states(current_noah.soc) | float(0) }}"
            current_power: "{{ states(current_noah.power) | float(0) }}"
            
            # Gibt es andere AKTIVE Noah >= min_soc?
            other_active_above_min: >-
              {%- set result = false -%}
              {%- for unit in noah_units -%}
                {%- set unit_soc = states(unit.soc) | float(0) -%}
                {%- set unit_power = states(unit.power) | float(0) -%}
                {%- if unit.soc != current_noah.soc and unit_power > min_output_power and unit_soc >= min_soc -%}
                  {%- set result = true -%}
                {%- endif -%}
              {%- endfor -%}
              {{ result }}

        # ========== ZUSTAND 1: INITIAL DROSSELN ==========
        # < max_soc UND andere >= max_soc UND aktuell aktiv
        - if:
            - condition: template
              value_template: "{{ current_soc < max_soc and others_above_max and current_power != min_output_power }}"
          then:
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ min_output_power }}"
            
            - variables:
                throttled_units: "{{ throttled_units + [current_noah.name] }}"
                changes_made: true

        # ========== ZUSTAND 2: WARTEN ==========
        # < max_soc UND >= min_soc UND andere gedrosselt → NICHTS TUN
        # (Noah bleibt aktiv, wartet bis er selbst < min_soc fällt)

        # ========== ZUSTAND 3: SELBST DROSSELN ==========
        # < min_soc UND andere gedrosselt UND andere aktive >= min_soc
        - if:
            - condition: template
              value_template: "{{ current_soc < min_soc and any_throttled and other_active_above_min and current_power != min_output_power }}"
          then:
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ min_output_power }}"
            
            - variables:
                throttled_units: "{{ throttled_units + [current_noah.name] }}"
                changes_made: true

        # ========== ZUSTAND 4: ALLE FREIGEBEN ==========
        # < min_soc UND andere gedrosselt UND KEINE anderen aktiven >= min_soc
        - if:
            - condition: template
              value_template: "{{ current_soc < min_soc and any_throttled and not other_active_above_min and current_power != max_output_power }}"
          then:
            # DPL Mode aktivieren falls nicht aktiv
            - if:
                - condition: template
                  value_template: "{{ dtu_mode_select != [] and states(dtu_mode_select) != '0' }}"
              then:
                - action: select.select_option
                  target:
                    entity_id: "{{ dtu_mode_select }}"
                  data:
                    option: "0"
            
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ max_output_power }}"
            
            - variables:
                released_units: "{{ released_units + [current_noah.name] }}"
                changes_made: true

  # action_type final setzen
  - variables:
      action_type: "{{ 'release' if released_units | length > 0 else ('loadbalancing' if throttled_units | length > 0 else 'no_action') }}"

  # Actions ausführen
  - if:
      - condition: template
        value_template: "{{ changes_made and actions != [] }}"
    then:
      - choose:
          - conditions: []
            sequence: !input actions

  # Debug-Log
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: shell_command.noah_debug_log
        data:
          timestamp: "{{ now().isoformat() }}"
          trigger: "{{ trigger.id ~ ': ' ~ (trigger.entity_id | default('N/A')) }}"
          soc_ol: "{{ states(noah_1_soc) }}"
          soc_or: "{{ states(noah_2_soc) }}"
          soc_ul: "{{ states(noah_3_soc) }}"
          soc_ur: "{{ states(noah_4_soc) }}"
          power_ol: "{{ states(noah_1_power) }}"
          power_or: "{{ states(noah_2_power) }}"
          power_ul: "{{ states(noah_3_power) }}"
          power_ur: "{{ states(noah_4_power) }}"
          should_throttle: "[]"
          should_release: "[]"
          throttled: "{{ throttled_units | to_json }}"
          released: "{{ released_units | to_json }}"
          throttled_count: "{{ throttled_units | length }}"
          active_count: "{{ noah_units | length - throttled_units | length }}"
          changes: "{{ changes_made }}"
          max_soc: "{{ max_soc }}"
          min_soc: "{{ min_soc }}"
          action_type: "{{ action_type }}"

mode: single
max_exceeded: silent

# ========== CHANGELOG ==========
# v2.28 (2026-04-06)
# - KOMPLETT NEU: Hysterese-Logik mit 4 Zuständen
# 
# Problem v2.27:
# - Einfache Schwellen-Logik: < min_soc drosseln
# - Kein Schutz vor Oszillation (74%↔73% Zappelei)
# - Keine Berücksichtigung von anderen aktiven Noah
# 
# Neue Hysterese-Logik:
# - max_soc (77%) = obere Schwelle (drosseln)
# - min_soc (74%) = untere Schwelle (freigeben)
# - 3% Hysterese verhindert Oszillation
# 
# 4-Zustands-Maschine pro Noah:
# 
# ZUSTAND 1 - INITIAL DROSSELN:
#   if < max_soc AND andere >= max_soc AND Power = 800W:
#     → 0W (gedrosselt)
# 
# ZUSTAND 2 - WARTEN:
#   if < max_soc AND >= min_soc AND any_throttled:
#     → NICHTS TUN (bleibt 800W, wartet bis < min_soc)
# 
# ZUSTAND 3 - SELBST DROSSELN:
#   if < min_soc AND any_throttled AND andere_aktive >= min_soc:
#     → 0W (auch gedrosselt, andere warten noch)
# 
# ZUSTAND 4 - ALLE FREIGEBEN:
#   if < min_soc AND any_throttled AND KEINE anderen_aktiven >= min_soc:
#     → ALLE 800W (alle unter min_soc, zurück zu normal)
# 
# Neue Variables:
# - any_throttled: min. 1 Noah auf 0W
# - other_active_above_min: andere Noah mit 800W UND >= min_soc
# 
# Szenario-Beispiel (max=77%, min=74%):
# t0: 78%, 78%, 22%, 16% → 800W, 800W, 0W, 0W
# t1: 76%, 78%, 22%, 16% → 800W, 800W, 0W, 0W (Noah 1 wartet)
# t2: 73%, 78%, 22%, 16% → 0W, 800W, 0W, 0W (Noah 1 gedrosselt)
# t3: 73%, 73%, 23%, 17% → 800W, 800W, 800W, 800W (alle freigegeben)
# 
# Verhindert:
# - Oszillation bei 74%↔73%
# - Falsches Drosseln von fast-vollen Noah
# - Ungleichmäßiges Balancing
# 
# v2.27 (2026-04-06)
# - KRITISCHER FIX: Falsche Drosselung von fast-vollen Noah
# 
# Problem v2.26:
# - Drosseln-Condition: current_soc < max_soc (z.B. < 77%)
# - Drosselt ALLE Noah < 77%, auch Noah mit 76%!
# - Real-World: Noah 1=77%, Noah 2=76% → Noah 2 gedrosselt ❌
# - Noah 2 ist nur 1% schwächer, sollte NICHT gedrosselt werden
# 
# Root Cause:
# - max_soc = obere Schwelle für "voll genug"
# - min_soc = untere Schwelle für "zu schwach"
# - Drosseln sollte nur SCHWACHE Noah (< min_soc) betreffen
# - NICHT alle die "nicht ganz voll" sind (< max_soc)
# 
# Lösung v2.27:
# - Zeile 549: current_soc < max_soc → current_soc < min_soc
# - Drosselt nur Noah < min_soc (z.B. < 74%)
# - Beispiel: Noah 1=77%, Noah 2=76%, Noah 3=22%, Noah 4=16%
#   - others_above_max = true (Noah 1 >= 77%)
#   - DROSSELN: Noah 3+4 (< 74%) ✓
#   - NICHT drosseln: Noah 2 (76% >= 74%) ✓
# 
# Validiert gegen Debug-Log:
# - Run 21:20:36: Noah 2 (76%) wurde fälschlicherweise gedrosselt
# - Mit v2.27: Noah 2 bleibt aktiv, nur Noah 3+4 gedrosselt
# 
# v2.26 (2026-04-06)
# - KRITISCHER FIX: others_above_max Template-Syntax
# 
# Problem v2.25:
# - variables: others_above_max: >- (multi-line mit folded block)
# - Action variables: Blöcke rendern KEINE multi-line Templates
# - Template wird als STRING gespeichert: "{% set result = false %}..."
# - Trace zeigt: others_above_max = String, NICHT boolean
# 
# Root Cause (aus HA Docs validiert):
# - Top-level variables: (Blueprint) → Template-Syntax flexibel
# - Action variables: → NUR einzeiliges "{{ }}" Template
# - Multi-line (|, >-) wird als literal String interpretiert
# 
# Lösung v2.26:
# - Einzeilige Filter-Chain mit "{{ }}" Syntax:
#   others_above_max: "{{ noah_units | map(attribute='soc') | map('states') | map('float', 0) | select('ge', max_soc) | list | length > 0 }}"
# - Ablauf validiert:
#   1. map(attribute='soc') → extrahiert entity_ids
#   2. map('states') → holt States
#   3. map('float', 0) → konvertiert zu float
#   4. select('ge', max_soc) → filtert >= max_soc
#   5. list | length > 0 → True wenn Liste nicht leer
# - Korrekt nach HA Script Syntax Dokumentation
# 
# v2.25 (2026-04-06)
# - KRITISCHER FIX: others_above_max Template wird nicht ausgeführt
# 
# Problem v2.24:
# - variables: others_above_max: | ... (literal block operator)
# - Template wird als STRING gespeichert, NICHT ausgeführt!
# - Trace zeigt: "others_above_max": "{% set result = false %}\\n..."
# - Conditions greifen nie (String statt boolean)
# - Basis-Logik läuft komplett durch ohne Aktion
# 
# Root Cause:
# - YAML "|" = literal block → speichert Text as-is
# - Action variables: braucht ">-" (folded block) für Template-Execution
# - Muss mit {{ result }} enden um Wert zurückzugeben
# 
# Lösung v2.25:
# - others_above_max: >- (statt |)
# - {%- set ... -%} (strip whitespace mit -)
# - {{ result }} am Ende bleibt
# - Template wird jetzt AUSGEFÜHRT → true/false
# 
# Validiert gegen:
# - HA Docs: "Variables can be templated" (Script Syntax)
# - Community Examples: namespace() pattern
# - Trace sollte zeigen: "others_above_max": "True" / "False"
# 
# v2.24 (2026-04-06)
# - KRITISCHER FIX: Cooldown-Template as_datetime Error
# 
# Problem v2.23:
# - Template: {% set last_change = state_attr(...) | as_datetime %}
# - as_datetime läuft VOR None-Check
# - Wenn state_attr None zurückgibt → ValueError
# - Error: "as_datetime got invalid input 'None'"
# 
# Lösung v2.24:
# - None-Check ZUERST:
#   {% set last_change_raw = state_attr(dtu_mode_select, 'last_changed') %}
#   {% if last_change_raw is none %} {{ false }}
#   {% else %} {% set last_change = last_change_raw | as_datetime %} ...
# - Auch in logbook.log message gefixt
# - Bekanntes Problem aus v2.7, war in v2.22 wieder eingebaut
# 
# v2.23 (2026-04-06)
# - KRITISCHER FIX: SOC-Balancing wieder aktiviert
# 
# Problem v2.22:
# - Pro-Noah-Logik OHNE Balancing
# - Noah >= 90% → gedrosselt (0W)
# - Alle anderen aktiv (800W)
# - KEIN Ausgleich zwischen Noah
# - Beispiel: Noah 1=92%, Noah 2-4=85% → Noah 1 gedrosselt, 2-4 aktiv → SOC bleibt unterschiedlich
# 
# Lösung v2.23:
# - others_above_max Variable vor Loop
# - DROSSELN wenn < max_soc UND andere >= max_soc
# - FREIGEBEN wenn <= min_soc UND KEINE anderen >= max_soc
# - Beispiel: Noah 1=92%, Noah 2-4=85% → Noah 2-4 gedrosselt → SOC gleicht sich an
# 
# Beibehaltene Verbesserungen aus v2.22:
# - Klare Struktur
# - Power-Check vor set_value (kein Telegram-Spam)
# - Cooldown auf DPL Mode last_changed
# - Override aktiviert DPL Mode
# - Release aktiviert DPL Mode
# - Debug-Log am Ende
# 
# LOGIK:
# 1. DTU Solar: Alle 100% + vor Sonnenuntergang → DPL=2, alle 400W
# 2. DTU Return: DPL=2 + min 1 < 100% → DPL=0
# 3. Override: Netzbezug > Schwelle → DPL=0, alle 800W
# 4. Cooldown: DPL Mode geändert < 5 Min → SKIP Basis
# 5. Basis SOC-Balancing:
#    - Gibt es Noah >= 90%?
#      JA: Drossle alle < 90% auf 0W
#      NEIN: Gebe alle <= 85% auf 800W frei

# v2.22 (2026-04-06)
# - KOMPLETT NEU: Einfache, klare Pro-Noah-Logik
# - ACHTUNG: KEIN SOC-Balancing mehr!
# - Pro Noah einzeln: >= max_soc → drosseln, <= min_soc → freigeben
# - Keine Abhängigkeit von anderen Noah
# - v2.23 behebt dies durch Wiedereinführung von others_above_max

