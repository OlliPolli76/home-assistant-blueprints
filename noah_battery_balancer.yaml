blueprint:
  name: Noah Battery Balancer 2.12
  description: |
    Intelligentes Lastmanagement für bis zu 6 Growatt Noah 2000 Batteriespeicher.
    Balanciert SOC-Unterschiede durch Drosselung, optimiert Netzbezug und steuert DTU für Nulleinspeisung.
    
    Intelligent load management for up to 6 Growatt Noah 2000 battery storage units.
    Balances SOC differences via throttling, optimizes grid consumption and controls DTU for zero feed-in.
  
  domain: automation

  source_url: https://github.com/OlliPolli76/home-assistant-blueprints/blob/main/noah_battery_balancer.yaml

  author: OlliPolli

  homeassistant:
    min_version: 2024.1.0

  input:
    # ========== Debug (Optional) ==========
    debug_enabled:
      name: Debug-Modus
      description: |
        Aktiviert Debug-Logging über Logbook-Einträge.
        
        Enables debug logging via Logbook entries.
      default: false
      selector:
        boolean:

    # ========== Noah Battery Units (1-6) ==========
    noah_1_soc:
      name: Noah 1 - SOC Sensor
      description: State of Charge Sensor für Noah 1 (0-100%)
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_1_power:
      name: Noah 1 - Output Power
      description: Output Power Steuerung für Noah 1 (0-800W)
      selector:
        entity:
          filter:
            - domain: number

    noah_2_soc:
      name: Noah 2 - SOC Sensor
      description: State of Charge Sensor für Noah 2 (0-100%)
      # default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_2_power:
      name: Noah 2 - Output Power
      description: Output Power Steuerung für Noah 2 (0-800W)
      # default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_3_soc:
      name: Noah 3 - SOC Sensor
      description: State of Charge Sensor für Noah 3 (0-100%)
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_3_power:
      name: Noah 3 - Output Power
      description: Output Power Steuerung für Noah 3 (0-800W)
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_4_soc:
      name: Noah 4 - SOC Sensor
      description: State of Charge Sensor für Noah 4 (0-100%)
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_4_power:
      name: Noah 4 - Output Power
      description: Output Power Steuerung für Noah 4 (0-800W)
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_5_soc:
      name: Noah 5 - SOC Sensor
      description: State of Charge Sensor für Noah 5 (0-100%)
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_5_power:
      name: Noah 5 - Output Power
      description: Output Power Steuerung für Noah 5 (0-800W)
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_6_soc:
      name: Noah 6 - SOC Sensor
      description: State of Charge Sensor für Noah 6 (0-100%)
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_6_power:
      name: Noah 6 - Output Power
      description: Output Power Steuerung für Noah 6 (0-800W)
      default: []
      selector:
        entity:
          filter:
            - domain: number

    # ========== SOC Thresholds ==========
    max_soc:
      name: Max SOC (Drosselung)
      description: |
        SOC-Schwelle für Drosselung (Standard: 95%).
        Batterien über diesem Wert bleiben aktiv, alle anderen werden gedrosselt.
        
        SOC threshold for throttling (default: 95%).
        Batteries above this value stay active, all others will be throttled.
      default: 95
      selector:
        number:
          min: 30
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    min_soc:
      name: Min SOC (Freigabe)
      description: |
        SOC-Schwelle für Freigabe (Standard: 85%).
        Wenn gedrosselte Batterie unter diesen Wert fällt UND keine andere über Max SOC, wird freigegeben.
        
        SOC threshold for release (default: 85%).
        When throttled battery falls below this AND no other above Max SOC, it will be released.
      default: 85
      selector:
        number:
          min: 30
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    # ========== Power Settings ==========
    min_output_power:
      name: Min Output Power
      description: |
        Minimale Ausgangsleistung beim Drosseln (Standard: 50W, Schritte: 50W).
        
        Minimum output power when throttling (default: 50W, steps: 50W).
      default: 50
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"
          mode: box

    max_output_power:
      name: Max Output Power
      description: |
        Maximale Ausgangsleistung im Normalbetrieb (Standard: 800W, Schritte: 50W).
        
        Maximum output power in normal operation (default: 800W, steps: 50W).
      default: 800
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"
          mode: box

    # ========== Grid Override (Optional) ==========
    netzbezug_enabled:
      name: Netzbezug-Override aktivieren
      description: |
        Aktiviert Notfall-Modus bei hohem Netzbezug.
        Alle Batterien werden auf Max Power gesetzt wenn Schwelle überschritten.
        
        Enables emergency mode for high grid consumption.
        All batteries set to max power when threshold exceeded.
      default: false
      selector:
        boolean:

    netzbezug_sensor:
      name: Netzbezug-Sensor
      description: Sensor für aktuelle Netzleistung (positiv - Verbrauch)
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power

    netzbezug_threshold:
      name: Netzbezug-Schwelle
      description: Netzbezug-Schwelle in Watt für Override
      default: 500
      selector:
        number:
          min: 0
          max: 10000
          step: 100
          unit_of_measurement: "W"
          mode: box

    netzbezug_duration:
      name: Netzbezug-Verzögerung
      description: Wie lange muss Schwelle überschritten sein (Sekunden)
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5
          unit_of_measurement: "s"
          mode: box

    netzbezug_min_soc:
      name: Netzbezug Min SOC
      description: |
        Minimaler SOC für Override
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    netzbezug_cooldown_minutes:
      name: Netzbezug Cooldown
      description: |
        Wartezeit nach Override bevor erneut aktiviert (Minuten).
        Verhindert Ping-Pong zwischen Override und Loadbalancing.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "min"
          mode: box

    netzbezug_off_threshold:
      name: Netzbezug Deaktivierungs-Schwelle
      description: |
        Netzbezug muss unter diesen Wert fallen um Override zu deaktivieren (W).
      default: 200
      selector:
        number:
          min: 0
          max: 5000
          step: 50
          unit_of_measurement: "W"
          mode: box

    netzbezug_off_duration:
      name: Netzbezug Deaktivierungs-Dauer
      description: |
        Wie lange muss Netzbezug unter Deaktivierungs-Schwelle bleiben (Sekunden).
      default: 60
      selector:
        number:
          min: 10
          max: 300
          step: 10
          unit_of_measurement: "s"
          mode: box

    # ========== DTU Solar Optimizer (Optional) ==========
    dtu_enabled:
      name: DTU Solar-Optimizer aktivieren
      description: |
        Aktiviert automatische DTU-Steuerung vor Sonnenuntergang.
        Bei allen Noah 100% → Einspeisung bis Platz für letzte Sonnenstunden.
        
        Enables automatic DTU control before sunset.
        When all Noah 100% → feed-in until space for last sun hours.
      default: false
      selector:
        boolean:

    dtu_mode_select:
      name: DTU DPL Mode Select
      description: Select-Entity für Dynamic Power Limiter Mode (0 - aktiv, 1 - aus, 2 - deaktiviert)
      default: []
      selector:
        entity:
          filter:
            - domain: select

    hours_before_sunset:
      name: Stunden vor Sonnenuntergang
      description: |
        Bis wie vielen Stunden vor Sonnenuntergang soll DTU auf Einspeisung schalten (Standard: 2h).
        
        Up to how many hours before sunset should the DTU switch to feed-in mode (default: 2 hours).
      default: 2
      selector:
        number:
          min: 0.5
          max: 6
          step: 0.5
          unit_of_measurement: "h"
          mode: slider

    feed_in_output_power:
      name: Einspeisung Output Power
      description: |
        Output Power während Einspeisung (DPL Mode 2).
        Standard: 400W pro Noah.
        
        Output power during feed-in (DPL Mode 2).
        Default: 400W per Noah.
      default: 400
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"
          mode: box

    # ========== Actions (Optional) ==========
    actions:
      name: Aktionen
      description: |
        Benachrichtigungen oder andere Aktionen nach jeder Balancing-Änderung.
        
        Verfügbare Variablen:
        
        {{action_type}} = Art der Aktion (dtu_solar, dtu_return, netzbezug_override, loadbalancing, release)
        {{noah_status}} = Einfache Textliste aller Noah mit SOC und Status
        {{noah_status_html}} = HTML-formatiert (für Telegram)
        {{noah_status_markdown}} = Markdown-formatiert
        {{throttled_noah}} = Liste gedrosselter Noah (Text)
        {{active_noah}} = Liste aktiver Noah (Text)
        {{throttled_count}} = Anzahl gedrosselter Noah
        {{active_count}} = Anzahl aktiver Noah
        {{full_count}} = Anzahl Noah mit 100% SOC
        {{max_soc_noah}} = Name des vollsten Noah
        {{max_soc_value}} = Höchster SOC-Wert
        {{netzbezug}} = Aktueller Netzbezug in W (nur bei netzbezug_override)
        {{hours_to_sunset}} = Stunden bis Sonnenuntergang (nur bei dtu_solar)
      default: []
      selector:
        action: {}

# ========== VARIABLES ==========

variables:
  # ========== Blueprint-Inputs als Variablen laden ==========
  debug_enabled: !input debug_enabled
  noah_1_soc: !input noah_1_soc
  noah_1_power: !input noah_1_power
  noah_2_soc: !input noah_2_soc
  noah_2_power: !input noah_2_power
  noah_3_soc: !input noah_3_soc
  noah_3_power: !input noah_3_power
  noah_4_soc: !input noah_4_soc
  noah_4_power: !input noah_4_power
  noah_5_soc: !input noah_5_soc
  noah_5_power: !input noah_5_power
  noah_6_soc: !input noah_6_soc
  noah_6_power: !input noah_6_power
  max_soc: !input max_soc
  min_soc: !input min_soc
  min_output_power: !input min_output_power
  max_output_power: !input max_output_power
  netzbezug_enabled: !input netzbezug_enabled
  netzbezug_sensor: !input netzbezug_sensor
  netzbezug_threshold: !input netzbezug_threshold
  netzbezug_duration: !input netzbezug_duration
  netzbezug_min_soc: !input netzbezug_min_soc
  netzbezug_cooldown_minutes: !input netzbezug_cooldown_minutes
  netzbezug_off_threshold: !input netzbezug_off_threshold
  netzbezug_off_duration: !input netzbezug_off_duration
  dtu_enabled: !input dtu_enabled
  dtu_mode_select: !input dtu_mode_select
  hours_before_sunset: !input hours_before_sunset
  feed_in_output_power: !input feed_in_output_power
  actions: !input actions
  changes_made: false
  
  # Noah-Konfiguration sammeln
  noah_units: |
    {%- set units = [] -%}
    {%- if noah_1_soc not in ['', None, []] and noah_1_power not in ['', None, []] -%}
      {%- set units = units + [{'soc': noah_1_soc, 'power': noah_1_power, 'name': 'Noah 1'}] -%}
    {%- endif -%}
    {%- if noah_2_soc not in ['', None, []] and noah_2_power not in ['', None, []] -%}
      {%- set units = units + [{'soc': noah_2_soc, 'power': noah_2_power, 'name': 'Noah 2'}] -%}
    {%- endif -%}
    {%- if noah_3_soc not in ['', None, []] and noah_3_power not in ['', None, []] -%}
      {%- set units = units + [{'soc': noah_3_soc, 'power': noah_3_power, 'name': 'Noah 3'}] -%}
    {%- endif -%}
    {%- if noah_4_soc not in ['', None, []] and noah_4_power not in ['', None, []] -%}
      {%- set units = units + [{'soc': noah_4_soc, 'power': noah_4_power, 'name': 'Noah 4'}] -%}
    {%- endif -%}
    {%- if noah_5_soc not in ['', None, []] and noah_5_power not in ['', None, []] -%}
      {%- set units = units + [{'soc': noah_5_soc, 'power': noah_5_power, 'name': 'Noah 5'}] -%}
    {%- endif -%}
    {%- if noah_6_soc not in ['', None, []] and noah_6_power not in ['', None, []] -%}
      {%- set units = units + [{'soc': noah_6_soc, 'power': noah_6_power, 'name': 'Noah 6'}] -%}
    {%- endif -%}
    {{ units }}

  # Alle SOC-Werte sammeln
  all_soc_values: |
    {%- set values = [] -%}
    {%- if noah_1_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_1_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_2_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_2_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_3_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_3_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_4_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_4_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_5_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_5_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_6_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_6_soc) | float(0)] -%}
    {%- endif -%}
    {{ values }}

  # Prüfen ob alle Noah 100%
  all_at_100: |
    {%- set values = [] -%}
    {%- if noah_1_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_1_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_2_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_2_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_3_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_3_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_4_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_4_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_5_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_5_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_6_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_6_soc) | float(0)] -%}
    {%- endif -%}
    {{ values | min >= 100 if values else false }}

  # Prüfen ob mindestens einer unter 100%
  any_below_100: |
    {%- set values = [] -%}
    {%- if noah_1_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_1_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_2_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_2_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_3_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_3_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_4_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_4_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_5_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_5_soc) | float(0)] -%}
    {%- endif -%}
    {%- if noah_6_soc not in ['', None, []] -%}
      {%- set values = values + [states(noah_6_soc) | float(0)] -%}
    {%- endif -%}
    {{ values | min < 100 if values else false }}

  # Zeit bis Sonnenuntergang in Stunden
  hours_until_sunset: >
    {% set sunset = state_attr('sun.sun', 'next_setting') | as_datetime %}
    {% set now = now() %}
    {{ (sunset - now).total_seconds() / 3600 }}

# ========== TRIGGER ==========
trigger:
  # Trigger auf alle konfigurierten Noah SOC-Änderungen
  - platform: state
    entity_id: !input noah_1_soc
    id: noah_soc_change

  - platform: state
    entity_id: !input noah_2_soc
    id: noah_soc_change

  - platform: state
    entity_id: !input noah_3_soc
    id: noah_soc_change

  - platform: state
    entity_id: !input noah_4_soc
    id: noah_soc_change

  - platform: state
    entity_id: !input noah_5_soc
    id: noah_soc_change

  - platform: state
    entity_id: !input noah_6_soc
    id: noah_soc_change

  # Netzbezug-Trigger (wenn konfiguriert)
  - platform: numeric_state
    entity_id: !input netzbezug_sensor
    above: !input netzbezug_threshold
    for:
      seconds: !input netzbezug_duration
    id: netzbezug_override

  # DTU Mode-Trigger (für manuelle Rückkehr zu Auto)
  - platform: state
    entity_id: !input dtu_mode_select
    id: dtu_mode_change

# ========== CONDITIONS ==========
condition: []

# ========== ACTIONS ==========
action:
  # ========== DEBUG: Variables Check ==========
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: logbook.log
        data:
          name: Noah Balancer Debug
          message: "Variables - Units: {{ noah_units | length }}, SOC: {{ all_soc_values | min }}-{{ all_soc_values | max }}%, All@100: {{ all_at_100 }}, Sunset: {{ hours_until_sunset }}h"

  # ========== PRIO 1: DTU Solar-Optimizer ==========
  - if:
      - condition: template
        value_template: "{{ dtu_enabled }}"
      - condition: template
        value_template: "{{ all_at_100 }}"
      - condition: template
        value_template: "{{ hours_until_sunset > hours_before_sunset }}"
      - condition: template
        value_template: "{{ dtu_mode_select != [] }}"
    then:
      # DEBUG: DTU Solar-Optimizer Start
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: logbook.log
            data:
              name: Noah Balancer DTU
              message: "Solar Override - All@100: {{ all_at_100 }}, Sunset: {{ hours_until_sunset }}h (threshold: {{ hours_before_sunset }}h), Mode→2, Power→{{ feed_in_output_power }}W"

      # DTU Mode auf 2 (deaktiviert = Einspeisung)
      - action: select.select_option
        target:
          entity_id: !input dtu_mode_select
        data:
          option: "2"

      # Alle Noah auf Einspeisung-Power setzen
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: "{{ noah_units[repeat.index - 1].power }}"
              data:
                value: "{{ feed_in_output_power }}"

      # Variablen für Actions setzen
      - variables:
          changes_made: true
          action_type: "dtu_solar"
          hours_to_sunset: "{{ hours_until_sunset | round(1) }}"
          full_count: "{{ noah_units | length }}"
          active_count: "{{ noah_units | length }}"
          throttled_count: 0
          max_soc_value: 100
          noah_status: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ unit.name ~ ': ' ~ soc ~ '% (Einspeisung ' ~ feed_in_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_html: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '<b>' ~ unit.name ~ '</b>: ' ~ soc ~ '% (Einspeisung ' ~ feed_in_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_markdown: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '**' ~ unit.name ~ '**: ' ~ soc ~ '% (Einspeisung ' ~ feed_in_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          throttled_noah: ""
          active_noah: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set ns.text = ns.text ~ unit.name ~ ', ' %}
            {% endfor %}
            {{ ns.text.rstrip(', ') }}
          max_soc_noah: |
            {% set max_val = all_soc_values | max %}
            {% for unit in noah_units %}
              {% if states(unit.soc) | float(0) == max_val %}
                {{ unit.name }}
                {% break %}
              {% endif %}
            {% endfor %}
          netzbezug: 0

      # Actions ausführen
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

      # STOP - keine weitere Logik
      - stop: "DTU Solar-Optimizer aktiv"

  # DTU Rückschaltung: Wenn Mode 2 aktiv und mindestens ein Noah < 100%
  - if:
      - condition: template
        value_template: "{{ dtu_enabled }}"
      - condition: template
        value_template: "{{ dtu_mode_select != [] }}"
      - condition: state
        entity_id: !input dtu_mode_select
        state: "2"
      - condition: template
        value_template: "{{ any_below_100 }}"
    then:
      # DTU Mode zurück auf 0 (aktiv)
      - action: select.select_option
        target:
          entity_id: !input dtu_mode_select
        data:
          option: "0"

      # Variablen für Actions setzen
      - variables:
          changes_made: true
          action_type: "dtu_return"
          hours_to_sunset: "{{ hours_until_sunset | round(1) }}"
          full_count: "{{ all_soc_values | select('>=', 100) | list | length }}"
          noah_status: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ unit.name ~ ': ' ~ soc ~ '%\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_html: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '<b>' ~ unit.name ~ '</b>: ' ~ soc ~ '%\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_markdown: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '**' ~ unit.name ~ '**: ' ~ soc ~ '%\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          throttled_noah: ""
          active_noah: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set ns.text = ns.text ~ unit.name ~ ', ' %}
            {% endfor %}
            {{ ns.text.rstrip(', ') }}
          throttled_count: 0
          active_count: "{{ noah_units | length }}"
          max_soc_value: "{{ all_soc_values | max }}"
          max_soc_noah: |
            {% set max_val = all_soc_values | max %}
            {% for unit in noah_units %}
              {% if states(unit.soc) | float(0) == max_val %}
                {{ unit.name }}
                {% break %}
              {% endif %}
            {% endfor %}
          netzbezug: 0

      # Actions ausführen
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

  # ========== PRIO 2: Netzbezug-Override ==========
  - if:
      - condition: template
        value_template: "{{ netzbezug_enabled }}"
      - condition: template
        value_template: "{{ netzbezug_sensor != [] }}"
      - condition: numeric_state
        entity_id: !input netzbezug_sensor
        above: !input netzbezug_threshold
      - condition: template
        value_template: "{{ all_soc_values | min >= netzbezug_min_soc }}"
      # NEU: Mindestens 1 Noah NICHT auf max_output_power
      - condition: template
        value_template: >
          {% set any_not_max = namespace(found=false) %}
          {% for unit in noah_units %}
            {% if states(unit.power) | float(0) < max_output_power %}
              {% set any_not_max.found = true %}
            {% endif %}
          {% endfor %}
          {{ any_not_max.found }}
      # NEU: Cooldown - Letzte Änderung > cooldown_minutes
      - condition: template
        value_template: >
          {% set power_entities = noah_units | map(attribute='power') | list %}
          {% set last_changes = [] %}
          {% for entity in power_entities %}
            {% set last_change_attr = state_attr(entity, 'last_changed') %}
            {% if last_change_attr is not none %}
              {% set last_changes = last_changes + [as_timestamp(last_change_attr)] %}
            {% endif %}
          {% endfor %}
          {% if last_changes | length > 0 %}
            {% set newest_change = last_changes | max %}
            {{ (now().timestamp() - newest_change) > (netzbezug_cooldown_minutes * 60) }}
          {% else %}
            true
          {% endif %}
    then:
      # Alle Noah auf Max Power
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: "{{ noah_units[repeat.index - 1].power }}"
              data:
                value: "{{ max_output_power }}"

      # Variablen für Actions setzen
      - variables:
          changes_made: true
          action_type: "netzbezug_override"
          netzbezug: "{{ states(netzbezug_sensor) | float(0) | round(0) }}"
          active_count: "{{ noah_units | length }}"
          throttled_count: 0
          full_count: "{{ all_soc_values | select('>=', 100) | list | length }}"
          max_soc_value: "{{ all_soc_values | max }}"
          noah_status: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ unit.name ~ ': ' ~ soc ~ '% (Max Power ' ~ max_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_html: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '<b>' ~ unit.name ~ '</b>: ' ~ soc ~ '% (Max Power ' ~ max_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_markdown: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '**' ~ unit.name ~ '**: ' ~ soc ~ '% (Max Power ' ~ max_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          throttled_noah: ""
          active_noah: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set ns.text = ns.text ~ unit.name ~ ', ' %}
            {% endfor %}
            {{ ns.text.rstrip(', ') }}
          hours_to_sunset: 0

      # Actions ausführen
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

      # STOP
      - stop: "Netzbezug-Override aktiv"

  # ========== Globale Release: Alle Noah < min_soc ==========
  - if:
      - condition: template
        value_template: "{{ all_soc_values | max < min_soc }}"
    then:
      # DEBUG: Globale Release
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: logbook.log
            data:
              name: Noah Balancer Release
              message: "Global Release - Alle Noah < {{ min_soc }}%, setze alle auf {{ max_output_power }}W"

      # Alle Noah auf max_output_power
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: "{{ noah_units[repeat.index - 1].power }}"
              data:
                value: "{{ max_output_power }}"

      # Variablen für Actions setzen
      - variables:
          changes_made: true
          action_type: "release"
          throttled_count: 0
          active_count: "{{ noah_units | length }}"
          full_count: "{{ all_soc_values | select('>=', 100) | list | length }}"
          max_soc_value: "{{ all_soc_values | max }}"
          max_soc_noah: |
            {% set max_val = all_soc_values | max %}
            {% for unit in noah_units %}
              {% if states(unit.soc) | float(0) == max_val %}
                {{ unit.name }}
                {% break %}
              {% endif %}
            {% endfor %}
          throttled_noah: "-"
          active_noah: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set ns.text = ns.text ~ unit.name ~ ', ' %}
            {% endfor %}
            {{ ns.text.rstrip(', ') }}
          noah_status: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ unit.name ~ ': ' ~ soc ~ '% (Freigegeben ' ~ max_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_html: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '<b>' ~ unit.name ~ '</b>: ' ~ soc ~ '% (Freigegeben ' ~ max_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_markdown: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set ns.text = ns.text ~ '**' ~ unit.name ~ '**: ' ~ soc ~ '% (Freigegeben ' ~ max_output_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          netzbezug: 0
          hours_to_sunset: 0

      # Actions ausführen
      - if:
          - condition: template
            value_template: "{{ changes_made }}"
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

      # STOP - keine weitere Logik
      - stop: "Globale Release aktiv"

  # ========== PRIO 3: Loadbalancing ==========
  # DEBUG: Loadbalancing Start
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: logbook.log
        data:
          name: Noah Balancer Loadbalancing
          message: "Start - Units: {{ noah_units | length }}, Thresholds: max {{ max_soc }}% / min {{ min_soc }}%"

  # PHASE 1: Entscheide basierend auf SOC (NICHT Power) wer gedrosselt/released werden sollte
  - variables:
      # Welche Noah SOLLTEN gedrosselt sein? (wenn < max_soc UND andere >= max_soc)
      should_be_throttled: |
        {%- set result = namespace(list=[]) -%}
        {%- for unit in noah_units -%}
          {%- set current_soc = states(unit.soc) | float(0) -%}
          {%- if current_soc < max_soc -%}
            {%- set others_above_max = namespace(found=false) -%}
            {%- for other in noah_units -%}
              {%- if other.soc != unit.soc and states(other.soc) | float(0) >= max_soc -%}
                {%- set others_above_max.found = true -%}
              {%- endif -%}
            {%- endfor -%}
            {%- if others_above_max.found -%}
              {%- set result.list = result.list + [unit.name] -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
        {{ result.list | unique | list }}
      
      # Welche Noah SOLLTEN released sein? (wenn <= min_soc UND kein anderer >= max_soc)
      should_be_released: |
        {%- set result = namespace(list=[]) -%}
        {%- for unit in noah_units -%}
          {%- set current_soc = states(unit.soc) | float(0) -%}
          {%- if current_soc <= min_soc -%}
            {%- set others_above_max = namespace(found=false) -%}
            {%- for other in noah_units -%}
              {%- if other.soc != unit.soc and states(other.soc) | float(0) >= max_soc -%}
                {%- set others_above_max.found = true -%}
              {%- endif -%}
            {%- endfor -%}
            {%- if not others_above_max.found -%}
              {%- set result.list = result.list + [unit.name] -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
        {{ result.list | unique | list }}
      
      # Variablen für tatsächlich durchgeführte Actions
      throttled_units: []
      released_units: []

  # PHASE 2: Für jeden Noah - Setze nur wenn Power != Ziel
  - repeat:
      count: "{{ noah_units | length }}"
      sequence:
        - variables:
            current_noah: "{{ noah_units[repeat.index - 1] }}"
            current_soc: "{{ states(current_noah.soc) | float(0) }}"
            current_power: "{{ states(current_noah.power) | float(0) }}"

        # DEBUG: Loop Iteration
        - if:
            - condition: template
              value_template: "{{ debug_enabled }}"
          then:
            - service: logbook.log
              data:
                name: Noah Balancer Loop
                message: "#{{ repeat.index }} {{ current_noah.name }} - SOC: {{ current_soc }}%, Power: {{ current_power }}W, Should throttle: {{ current_noah.name in should_be_throttled }}, Should release: {{ current_noah.name in should_be_released }}"

        # DROSSELN wenn dieser Noah in should_be_throttled UND Power != min
        - if:
            - condition: template
              value_template: "{{ current_noah.name in should_be_throttled }}"
            - condition: template
              value_template: "{{ current_power != min_output_power }}"
          then:
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ min_output_power }}"
            - variables:
                throttled_units: "{{ throttled_units + [current_noah.name] }}"
                changes_made: true

        # RELEASE wenn dieser Noah in should_be_released UND Power != max
        - if:
            - condition: template
              value_template: "{{ current_noah.name in should_be_released }}"
            - condition: template
              value_template: "{{ current_power != max_output_power }}"
          then:
            # DEBUG: Release
            - if:
                - condition: template
                  value_template: "{{ debug_enabled }}"
              then:
                - service: logbook.log
                  data:
                    name: Noah Balancer Release
                    message: "{{ current_noah.name }} released - SOC: {{ current_soc }}% ≤ {{ min_soc }}%, Power: {{ current_power }}W → {{ max_output_power }}W"
            
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ max_output_power }}"
            - variables:
                released_units: "{{ released_units + [current_noah.name] }}"
                changes_made: true

  # PHASE 3: Actions Variablen (basiert auf should-Listen, nicht veraltetem states())
  - variables:
      # Wer sollte aktiv sein? = Alle außer should_be_throttled
      should_be_active: |
        {%- set result = namespace(list=[]) -%}
        {%- for unit in noah_units -%}
          {%- if unit.name not in should_be_throttled -%}
            {%- set result.list = result.list + [unit.name] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ result.list }}

  # DEBUG: Final Units Status
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: logbook.log
        data:
          name: Noah Balancer Status
          message: "Should throttle: {{ should_be_throttled | join(', ') or 'none' }} ({{ should_be_throttled | length }}), Should active: {{ should_be_active | join(', ') or 'none' }} ({{ should_be_active | length }}), Loop actions: T={{ throttled_units | length }} R={{ released_units | length }}"

  # Variablen für Actions setzen (nur wenn Änderungen)
  - if:
      - condition: template
        value_template: "{{ throttled_units | length > 0 or released_units | length > 0 }}"
    then:
      - variables:
          changes_made: true
          action_type: "{{ 'release' if released_units | length > 0 else 'loadbalancing' }}"
          throttled_count: "{{ should_be_throttled | length }}"
          active_count: "{{ should_be_active | length }}"
          full_count: "{{ all_soc_values | select('>=', 100) | list | length }}"
          max_soc_value: "{{ all_soc_values | max }}"
          max_soc_noah: |
            {% set max_val = all_soc_values | max %}
            {% for unit in noah_units %}
              {% if states(unit.soc) | float(0) == max_val %}
                {{ unit.name }}
                {% break %}
              {% endif %}
            {% endfor %}
          throttled_noah: |
            {% if should_be_throttled | length > 0 %}
              {{ should_be_throttled | join(', ') }}
            {% else %}
              -
            {% endif %}
          active_noah: |
            {% if should_be_active | length > 0 %}
              {{ should_be_active | join(', ') }}
            {% else %}
              -
            {% endif %}
          noah_status: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set status = 'Gedrosselt' if unit.name in should_be_throttled else 'Aktiv' %}
              {% set target_power = min_output_power if unit.name in should_be_throttled else max_output_power %}
              {% set ns.text = ns.text ~ unit.name ~ ': ' ~ soc ~ '% (' ~ status ~ ' → ' ~ target_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_html: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set status = 'Gedrosselt' if unit.name in should_be_throttled else 'Aktiv' %}
              {% set target_power = min_output_power if unit.name in should_be_throttled else max_output_power %}
              {% set ns.text = ns.text ~ '<b>' ~ unit.name ~ '</b>: ' ~ soc ~ '% (' ~ status ~ ' → ' ~ target_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          noah_status_markdown: |
            {% set ns = namespace(text='') %}
            {% for unit in noah_units %}
              {% set soc = states(unit.soc) | float(0) | round(0) %}
              {% set status = 'Gedrosselt' if unit.name in should_be_throttled else 'Aktiv' %}
              {% set target_power = min_output_power if unit.name in should_be_throttled else max_output_power %}
              {% set ns.text = ns.text ~ '**' ~ unit.name ~ '**: ' ~ soc ~ '% (' ~ status ~ ' → ' ~ target_power ~ 'W)\n' %}
            {% endfor %}
            {{ ns.text.strip() }}
          netzbezug: 0
          hours_to_sunset: 0

      # Actions ausführen (nur wenn Änderungen)
      - if:
          - condition: template
            value_template: "{{ changes_made }}"
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

mode: single
max_exceeded: silent

# ========== CHANGELOG ==========
# v2.12 (2026-04-03)
# - KRITISCHER FIX: should_be_throttled Logik korrigiert
# - Problem: "Wenn IRGENDEIN anderer >= max_soc → throttle diesen Noah"
#   → Bei SOC 43,42,39,40% mit max_soc=42%: ALLE 4 wurden als "should throttle" markiert!
#   → Loop actions: T=0 R=0 weil ALLE gedrosselt werden sollten (wer bleibt aktiv?)
#   → Keine Telegram-Nachricht obwohl Drosselung nötig war
# - Lösung: "Wenn DIESER Noah < max_soc UND andere >= max_soc → throttle"
#   → Bei SOC 43,42,39,40%: Nur Noah 3,4 (39,40%) werden gedrosselt
#   → Noah 1,2 (43,42%) bleiben aktiv
#   → Telegram-Nachricht wird korrekt gesendet
# - Jetzt funktioniert Loadbalancing wie vorgesehen!
#
# v2.11 (2026-04-03)
# - KRITISCHER FIX: Globale Release Logik vereinfacht
# - Problem: global_release_needed prüfte ob Noah >= max_soc existieren
#   → Wenn alle < max_soc: Globale Release läuft NICHT
#   → Loadbalancing Loop läuft stattdessen
#   → Released alle wegen veraltetem Power-Check
#   → Telegram-Spam obwohl alle schon aktiv
# - Lösung: Globale Release OHNE global_release_needed Check
#   → Wenn alle < min_soc: Setze ALLE auf max_output_power und STOP
#   → Loadbalancing Loop läuft gar nicht erst
# - Einfachere Logik: "Alle unter min_soc? → Alle aktiv. Punkt."
#
# v2.10 (2026-04-03)
# - Actions-Beschreibung umformatiert: {{variable}} statt variable: Beschreibung
# - Alle Variablen werden jetzt IMMER gesetzt (keine undefined errors mehr)
# - Fehlende Variablen in allen Actions-Blöcken ergänzt:
#   - DTU Solar: max_soc_noah, netzbezug
#   - DTU Return: throttled_noah, active_noah, throttled_count, active_count, max_soc_value, max_soc_noah, netzbezug
#   - Netzbezug Override: hours_to_sunset
#   - Globale Release: netzbezug, hours_to_sunset
#   - Loadbalancing: netzbezug, hours_to_sunset
# - Einfaches Kopieren der Variablen aus Beschreibung in Actions möglich
#
# v2.9 (2026-04-03)
# - KRITISCHER FIX: Globale Release Spam-Loop
# - Problem: Globale Release prüfte veraltete Power states → Telegram-Spam
# - Lösung: Prüfe ob should_be_throttled nicht leer (SOC-basiert, nicht Power)
# - Globale Release triggert nur noch wenn wirklich Noah gedrosselt WERDEN MÜSSEN
#
# v2.8 (2026-04-01)
# - KRITISCHER FIX: Jinja2 namespace für Liste-Konstruktion
# - Problem: result = result + [item] funktioniert nicht korrekt in Jinja2 loops
# - Lösung: namespace(list=[]) verwenden für mutable Listen
# - Betrifft: should_be_throttled, should_be_released, should_be_active
#
# v2.7 (2026-04-01)
# - KRITISCHER FIX: 2-Phasen-Tracking-System für Noah Power
# - Problem: Noah Power Entities brauchen 2-3s bis sie aktualisiert werden
# - Phase 1: Entscheide VOR set_value basierend auf SOC (nicht Power)
# - Phase 2: Setze nur wenn Power != Ziel (mit veraltetem Check)
# - Phase 3: Actions nutzen SOC-basierte Listen (nicht veraltete states)
# - Cooldown Template Fix: as_timestamp erst NACH None-Check
# - Lösung: Keine delays, schnelle Entscheidungen, korrekte Actions
#
# v2.6 (2026-03-31)
# - KRITISCHER FIX: Globale Release triggert nicht mehr bei jeder SOC-Änderung
# - Condition erweitert: Nur wenn min. 1 Noah < max_output_power
# - Problem: Release-Spam obwohl alle Noah bereits auf max
# - Lösung: Prüfe ob überhaupt was zu tun ist
#
# v2.5 (2026-03-31)
# - GLOBALE RELEASE-LOGIK: Wenn ALLE Noah < min_soc → Alle auf max_output_power
# - NETZBEZUG-OVERRIDE VERBESSERUNGEN:
#   - Neue Inputs: cooldown_minutes (5), off_threshold (200W), off_duration (60s)
#   - Condition: Nur wenn min. 1 Noah < max_output_power
#   - Cooldown-Check: Letzte Noah-Änderung > cooldown_minutes
#   - Verhindert Ping-Pong zwischen Override und Loadbalancing
# - Problem gelöst: Override → Netzbezug sinkt → Loadbalancing drosselt → Loop
# - Lösung: Override nur bei mind. 1 gedrosseltem Noah + Cooldown-Zeit
#
# v2.4 (2026-03-30)
# - KRITISCHER FIX: Telegram-Nachrichten funktionieren jetzt
# - Condition auf throttled_units/released_units statt final_throttled
# - Problem: Noah brauchen 1-2s für Wertübernahme → final_throttled war beim Check leer
# - Lösung: Prüfe ob number.set_value AUFGERUFEN wurde, nicht IST-Zustand
#
# v2.3 (2026-03-30)
# - KRITISCHER FIX: Actions werden nur bei echten Änderungen ausgeführt
# - changes_made Flag eingeführt (DTU/Netzbezug/Loadbalancing)
# - Loadbalancing-Condition auf final_throttled (IST-Zustand) umgestellt
# - Step-Size für Min/Max Output Power auf 50W (Noah-Hardware-Kompatibilität)
# - Default min_output_power: 20W → 50W
#
# v2.2 (2026-03-29)
# - Debug-System auf logbook.log umgestellt (6 Stellen)
# - persistent_notification.create → logbook.log für saubere Logs
# - Logbook-Einträge dauerhaft nachvollziehbar in HA History
# - Keine UI-Spam mehr durch Debug-Modus
#
# v2.0 (2026-03-28)
# - KRITISCHER FIX: !input durch Template-Variablen in number.set_value Actions ersetzt
# - Problem: !input funktioniert nicht zuverlässig in if/repeat Blöcken → Actions schlagen fehl
# - Lösung: value: "{{ max_output_power }}" statt value: !input max_output_power
# - Betrifft: feed_in_output_power, max_output_power, min_output_power
#
# v1.9 (2026-03-28)
# - KRITISCHER FIX: Zustandserkennung basierend auf IST-Power statt Loop-Tracking
# - Problem: Blueprint "vergisst" welche Noah gedrosselt sind zwischen Runs
# - Lösung: current_power auslesen (== min_output_power = gedrosselt, == max_output_power = aktiv)
# - Throttle nur wenn target_power != min_output_power (nicht schon gedrosselt)
# - Release nur wenn current_power == min_output_power (aktuell gedrosselt)
# - Actions-Variablen (final_throttled/final_active) basieren auf IST-Zustand aller Noah
# - Debug zeigt jetzt current_power und "Is throttled" Status
#
# v1.8 (2026-03-28)
# - DEBUG: Release-Logik Debug hinzugefügt
# - Debug zeigt jetzt: Release-Trigger, released_units, throttled_units
# - Hilft zu debuggen warum Noah unter min_soc gedrosselt bleiben
#
# v1.7 (2026-03-28)
