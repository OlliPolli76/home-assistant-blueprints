blueprint:
  name: Noah Battery Balancer 2.22
  description: |
    Einfaches, klares Lastmanagement für bis zu 6 Growatt Noah 2000.
    Pro-Noah Einzelsteuerung ohne komplexe Abhängigkeiten.
    
    Simple, clear load management for up to 6 Growatt Noah 2000.
    Per-Noah individual control without complex dependencies.
  
  domain: automation
  source_url: https://github.com/OlliPolli76/home-assistant-blueprints/blob/main/noah_battery_balancer.yaml
  author: OlliPolli
  homeassistant:
    min_version: 2024.1.0

  input:
    # ========== Debug ==========
    debug_enabled:
      name: Debug-Modus
      description: Aktiviert Debug-Logging
      default: false
      selector:
        boolean:

    # ========== Noah Units (1-6) ==========
    noah_1_soc:
      name: Noah 1 - SOC Sensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_1_power:
      name: Noah 1 - Output Power
      selector:
        entity:
          filter:
            - domain: number

    noah_2_soc:
      name: Noah 2 - SOC Sensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_2_power:
      name: Noah 2 - Output Power
      selector:
        entity:
          filter:
            - domain: number

    noah_3_soc:
      name: Noah 3 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_3_power:
      name: Noah 3 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_4_soc:
      name: Noah 4 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_4_power:
      name: Noah 4 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_5_soc:
      name: Noah 5 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_5_power:
      name: Noah 5 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    noah_6_soc:
      name: Noah 6 - SOC Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: battery

    noah_6_power:
      name: Noah 6 - Output Power
      default: []
      selector:
        entity:
          filter:
            - domain: number

    # ========== SOC Thresholds ==========
    max_soc:
      name: Max SOC (Drosselung)
      description: Drosseln wenn Noah >= diesem Wert
      default: 90
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"

    min_soc:
      name: Min SOC (Freigabe)
      description: Freigeben wenn Noah <= diesem Wert
      default: 85
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"

    # ========== Power Settings ==========
    min_output_power:
      name: Min Output Power (Drosselung)
      default: 0
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"

    max_output_power:
      name: Max Output Power (Normal)
      default: 800
      selector:
        number:
          min: 0
          max: 800
          step: 50
          unit_of_measurement: "W"

    # ========== Netzbezug Override ==========
    netzbezug_enabled:
      name: Netzbezug-Override aktivieren
      default: false
      selector:
        boolean:

    netzbezug_sensor:
      name: Netzbezug-Sensor
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power

    netzbezug_threshold:
      name: Netzbezug-Schwelle (W)
      default: 500
      selector:
        number:
          min: 0
          max: 10000
          step: 50

    netzbezug_duration:
      name: Netzbezug-Verzögerung (s)
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5

    netzbezug_min_soc:
      name: Netzbezug Min SOC (%)
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5

    netzbezug_cooldown_minutes:
      name: Netzbezug Cooldown (Min)
      description: Pausiere Basis-Logik nach DPL Mode Änderung
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1

    # ========== DTU Solar Optimizer ==========
    dtu_enabled:
      name: DTU Solar-Optimizer aktivieren
      default: false
      selector:
        boolean:

    dtu_mode_select:
      name: DTU DPL Mode Select
      description: "0=aktiv, 1=aus, 2=deaktiviert"
      default: []
      selector:
        entity:
          filter:
            - domain: select

    hours_before_sunset:
      name: Stunden vor Sonnenuntergang
      default: 2
      selector:
        number:
          min: 0.5
          max: 6
          step: 0.5

    feed_in_output_power:
      name: Einspeisung Output Power (W)
      default: 400
      selector:
        number:
          min: 0
          max: 800
          step: 50

    # ========== Actions ==========
    actions:
      name: Aktionen
      description: Benachrichtigungen nach Änderungen
      default: []
      selector:
        action: {}

# ========== VARIABLES ==========
variables:
  debug_enabled: !input debug_enabled
  noah_1_soc: !input noah_1_soc
  noah_1_power: !input noah_1_power
  noah_2_soc: !input noah_2_soc
  noah_2_power: !input noah_2_power
  noah_3_soc: !input noah_3_soc
  noah_3_power: !input noah_3_power
  noah_4_soc: !input noah_4_soc
  noah_4_power: !input noah_4_power
  noah_5_soc: !input noah_5_soc
  noah_5_power: !input noah_5_power
  noah_6_soc: !input noah_6_soc
  noah_6_power: !input noah_6_power
  max_soc: !input max_soc
  min_soc: !input min_soc
  min_output_power: !input min_output_power
  max_output_power: !input max_output_power
  netzbezug_enabled: !input netzbezug_enabled
  netzbezug_sensor: !input netzbezug_sensor
  netzbezug_threshold: !input netzbezug_threshold
  netzbezug_duration: !input netzbezug_duration
  netzbezug_min_soc: !input netzbezug_min_soc
  netzbezug_cooldown_minutes: !input netzbezug_cooldown_minutes
  dtu_enabled: !input dtu_enabled
  dtu_mode_select: !input dtu_mode_select
  hours_before_sunset: !input hours_before_sunset
  feed_in_output_power: !input feed_in_output_power
  actions: !input actions

  noah_units: |
    {%- set units = [] -%}
    {%- if noah_1_soc != [] and noah_1_power != [] -%}
      {%- set units = units + [{'soc': noah_1_soc, 'power': noah_1_power, 'name': 'Noah 1'}] -%}
    {%- endif -%}
    {%- if noah_2_soc != [] and noah_2_power != [] -%}
      {%- set units = units + [{'soc': noah_2_soc, 'power': noah_2_power, 'name': 'Noah 2'}] -%}
    {%- endif -%}
    {%- if noah_3_soc != [] and noah_3_power != [] -%}
      {%- set units = units + [{'soc': noah_3_soc, 'power': noah_3_power, 'name': 'Noah 3'}] -%}
    {%- endif -%}
    {%- if noah_4_soc != [] and noah_4_power != [] -%}
      {%- set units = units + [{'soc': noah_4_soc, 'power': noah_4_power, 'name': 'Noah 4'}] -%}
    {%- endif -%}
    {%- if noah_5_soc != [] and noah_5_power != [] -%}
      {%- set units = units + [{'soc': noah_5_soc, 'power': noah_5_power, 'name': 'Noah 5'}] -%}
    {%- endif -%}
    {%- if noah_6_soc != [] and noah_6_power != [] -%}
      {%- set units = units + [{'soc': noah_6_soc, 'power': noah_6_power, 'name': 'Noah 6'}] -%}
    {%- endif -%}
    {{ units }}

  hours_until_sunset: |
    {% set sunset = state_attr('sun.sun', 'next_setting') | as_datetime %}
    {{ (sunset - now()).total_seconds() / 3600 }}

# ========== TRIGGER ==========
trigger:
  - platform: state
    entity_id: !input noah_1_soc
  - platform: state
    entity_id: !input noah_2_soc
  - platform: state
    entity_id: !input noah_3_soc
  - platform: state
    entity_id: !input noah_4_soc
  - platform: state
    entity_id: !input noah_5_soc
  - platform: state
    entity_id: !input noah_6_soc
  - platform: numeric_state
    entity_id: !input netzbezug_sensor
    above: !input netzbezug_threshold
    for:
      seconds: !input netzbezug_duration

condition: []

# ========== ACTIONS ==========
action:
  # Initial variables
  - variables:
      action_type: "no_action"
      changes_made: false
      throttled_units: []
      released_units: []

  # ========== PRIO 1: DTU Solar-Optimizer ==========
  - if:
      - condition: template
        value_template: "{{ dtu_enabled and dtu_mode_select != [] }}"
      - condition: template
        value_template: |
          {% set all_100 = true %}
          {% for unit in noah_units %}
            {% if states(unit.soc) | float(0) < 100 %}
              {% set all_100 = false %}
            {% endif %}
          {% endfor %}
          {{ all_100 }}
      - condition: template
        value_template: "{{ hours_until_sunset > hours_before_sunset }}"
    then:
      - action: select.select_option
        target:
          entity_id: "{{ dtu_mode_select }}"
        data:
          option: "2"
      
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: "{{ noah_units[repeat.index - 1].power }}"
              data:
                value: "{{ feed_in_output_power }}"
      
      - variables:
          action_type: "dtu_solar"
          changes_made: true
      
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions
      
      - stop: "DTU Solar aktiv"

  # ========== DTU Return ==========
  - if:
      - condition: template
        value_template: "{{ dtu_enabled and dtu_mode_select != [] }}"
      - condition: state
        entity_id: !input dtu_mode_select
        state: "2"
      - condition: template
        value_template: |
          {% set any_below_100 = false %}
          {% for unit in noah_units %}
            {% if states(unit.soc) | float(0) < 100 %}
              {% set any_below_100 = true %}
            {% endif %}
          {% endfor %}
          {{ any_below_100 }}
    then:
      - action: select.select_option
        target:
          entity_id: "{{ dtu_mode_select }}"
        data:
          option: "0"
      
      - variables:
          action_type: "dtu_return"
          changes_made: true
      
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions

  # ========== PRIO 2: Netzbezug Override ==========
  - if:
      - condition: template
        value_template: "{{ netzbezug_enabled and netzbezug_sensor != [] }}"
      - condition: numeric_state
        entity_id: !input netzbezug_sensor
        above: !input netzbezug_threshold
      - condition: template
        value_template: |
          {% set all_above_min = true %}
          {% for unit in noah_units %}
            {% if states(unit.soc) | float(0) < netzbezug_min_soc %}
              {% set all_above_min = false %}
            {% endif %}
          {% endfor %}
          {{ all_above_min }}
      - condition: template
        value_template: |
          {% if dtu_mode_select == [] %}
            {{ true }}
          {% else %}
            {% set last_change = state_attr(dtu_mode_select, 'last_changed') | as_datetime %}
            {% if last_change is none %}
              {{ true }}
            {% else %}
              {{ (now() - last_change).total_seconds() / 60 >= netzbezug_cooldown_minutes }}
            {% endif %}
          {% endif %}
    then:
      # DPL Mode aktivieren falls nicht aktiv
      - if:
          - condition: template
            value_template: "{{ dtu_mode_select != [] and states(dtu_mode_select) != '0' }}"
        then:
          - action: select.select_option
            target:
              entity_id: "{{ dtu_mode_select }}"
            data:
              option: "0"
      
      # Alle Noah auf max
      - repeat:
          count: "{{ noah_units | length }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: "{{ noah_units[repeat.index - 1].power }}"
              data:
                value: "{{ max_output_power }}"
      
      - variables:
          action_type: "netzbezug_override"
          changes_made: true
      
      - if:
          - condition: template
            value_template: "{{ actions != [] }}"
        then:
          - choose:
              - conditions: []
                sequence: !input actions
      
      - stop: "Override aktiv"

  # ========== PRIO 3: Cooldown Check ==========
  - if:
      - condition: template
        value_template: |
          {% if dtu_mode_select == [] %}
            {{ false }}
          {% else %}
            {% set last_change = state_attr(dtu_mode_select, 'last_changed') | as_datetime %}
            {% if last_change is none %}
              {{ false }}
            {% else %}
              {{ (now() - last_change).total_seconds() / 60 < netzbezug_cooldown_minutes }}
            {% endif %}
          {% endif %}
    then:
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: logbook.log
            data:
              name: Noah Balancer Cooldown
              message: "Cooldown aktiv - DPL Mode geändert vor {{ ((now() - (state_attr(dtu_mode_select, 'last_changed') | as_datetime)).total_seconds() / 60) | round(1) }} Min"
      
      - stop: "Cooldown aktiv"

  # ========== PRIO 4: Basis-Logik (Pro Noah einzeln) ==========
  - repeat:
      count: "{{ noah_units | length }}"
      sequence:
        - variables:
            current_noah: "{{ noah_units[repeat.index - 1] }}"
            current_soc: "{{ states(current_noah.soc) | float(0) }}"
            current_power: "{{ states(current_noah.power) | float(0) }}"

        # DROSSELN wenn >= max_soc UND Power != min
        - if:
            - condition: template
              value_template: "{{ current_soc >= max_soc and current_power != min_output_power }}"
          then:
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ min_output_power }}"
            
            - variables:
                throttled_units: "{{ throttled_units + [current_noah.name] }}"
                changes_made: true

        # FREIGEBEN wenn <= min_soc UND Power != max
        - if:
            - condition: template
              value_template: "{{ current_soc <= min_soc and current_power != max_output_power }}"
          then:
            # DPL Mode aktivieren falls nicht aktiv
            - if:
                - condition: template
                  value_template: "{{ dtu_mode_select != [] and states(dtu_mode_select) != '0' }}"
              then:
                - action: select.select_option
                  target:
                    entity_id: "{{ dtu_mode_select }}"
                  data:
                    option: "0"
            
            - action: number.set_value
              target:
                entity_id: "{{ current_noah.power }}"
              data:
                value: "{{ max_output_power }}"
            
            - variables:
                released_units: "{{ released_units + [current_noah.name] }}"
                changes_made: true

  # action_type final setzen
  - variables:
      action_type: "{{ 'release' if released_units | length > 0 else ('loadbalancing' if throttled_units | length > 0 else 'no_action') }}"

  # Actions ausführen
  - if:
      - condition: template
        value_template: "{{ changes_made and actions != [] }}"
    then:
      - choose:
          - conditions: []
            sequence: !input actions

  # Debug-Log
  - service: shell_command.noah_debug_log
    data:
      timestamp: "{{ now().isoformat() }}"
      trigger: "{{ trigger.id ~ ': ' ~ (trigger.entity_id | default('N/A')) }}"
      soc_ol: "{{ states(noah_1_soc) }}"
      soc_or: "{{ states(noah_2_soc) }}"
      soc_ul: "{{ states(noah_3_soc) }}"
      soc_ur: "{{ states(noah_4_soc) }}"
      power_ol: "{{ states(noah_1_power) }}"
      power_or: "{{ states(noah_2_power) }}"
      power_ul: "{{ states(noah_3_power) }}"
      power_ur: "{{ states(noah_4_power) }}"
      should_throttle: "[]"
      should_release: "[]"
      throttled: "{{ throttled_units | to_json }}"
      released: "{{ released_units | to_json }}"
      throttled_count: "{{ throttled_units | length }}"
      active_count: "{{ noah_units | length - throttled_units | length }}"
      changes: "{{ changes_made }}"
      max_soc: "{{ max_soc }}"
      min_soc: "{{ min_soc }}"
      action_type: "{{ action_type }}"

mode: single
max_exceeded: silent

# ========== CHANGELOG ==========
# v2.22 (2026-04-06)
# - KOMPLETT NEU: Einfache, klare Pro-Noah-Logik
# 
# ALTE Logik (v2.21 und früher):
# - should_be_throttled: < max_soc wenn andere >= max_soc
# - should_be_released: <= min_soc wenn keine anderen >= max_soc
# → Zu komplex, Konflikte, Ping-Pong
# 
# NEUE Logik v2.22:
# - Pro Noah einzeln: >= max_soc → drosseln, <= min_soc → freigeben
# - Keine Abhängigkeit von anderen Noah
# - Keine should-Listen mehr
# 
# PRIORITÄTEN (in dieser Reihenfolge):
# 1. DTU Solar: Alle 100% + vor Sonnenuntergang → DPL=2, alle 400W
# 2. DTU Return: DPL=2 + min 1 < 100% → DPL=0
# 3. Override: Netzbezug > Schwelle → DPL=0, alle 800W
# 4. Cooldown: DPL Mode geändert < Cooldown → SKIP Basis
# 5. Basis: Pro Noah >= 90% → 0W, <= 85% → 800W + DPL=0
# 
# FIXES:
# - Cooldown nutzt last_changed(DPL Mode) statt Noah Power
# - Override aktiviert DPL Mode falls nicht aktiv
# - Release aktiviert DPL Mode falls nicht aktiv
# - action_type VOR Debug-Call gesetzt
# - Kein Ping-Pong mehr
# - Keine Duplikate in Listen mehr
# - Keine should-Konflikte mehr

# ========== CHANGELOG ==========
# v2.21 (2026-04-06)
# - ROLLBACK & KRITISCHE FIXES: Stabilität wiederherstellen
# 
# - FIX 1: Release-Logik Ping-Pong
#   Problem: should_be_released prüfte "kein anderer >= max_soc"
#   → Bei SOC zwischen min_soc (85%) und max_soc (90%): Release triggert
#   → Noah 2: 89% → Release alle → 90% → Throttle → 89% → Release → LOOP
#   Lösung: Release NUR bei <= min_soc, OHNE "others_above_max" Check
#   → Release nur wenn wirklich unter min_soc (85%)
#   → Keine Abhängigkeit von anderen Noah mehr
# 
# - FIX 2: Phase 2.5 Korrektur-Loop ENTFERNT (v2.20 war fehlerhaft)
#   Problem: v2.20 Korrektur-Loop setzte ALLES auf 800W
#   → Überschrieb korrektes Loadbalancing
#   → Erzeugte Duplikate in released_units
#   → Triggerte unnötige changes_made
#   Lösung: Phase 2.5 komplett entfernt
#   → Zurück zu stabiler v2.15 Logik
#   → should_be_active wieder in Phase 3
# 
# - FIX 3: action_type im Debug-Log
#   Problem: action_type in if-Block gesetzt → lokal, Debug sieht nur "no_action"
#   Lösung: action_type VOR Debug-Call final setzen
#   → Basierend auf throttled_units / released_units Listen
# 
# - FIX 4: Netzbezug-Override Cooldown
#   Problem: Override → Loadbalancing → Override → LOOP
#   → Cooldown sollte greifen, tut es aber nicht konsistent
#   Note: Cooldown-Logik aus v2.15 beibehalten
#   → Weitere Analyse nötig wenn Problem weiter besteht
# 
# v2.16-v2.20 waren instabil. v2.21 = v2.15 + Fixes.
#
# v2.20 (2026-04-04)
# - KRITISCHER FIX: Fehlende Aktivierungs-Logik
# - Problem: Noah in should_be_active wurden NICHT auf max_output_power gesetzt
#   → Nur Drosseln (should_be_throttled) und Release (should_be_released <= min_soc) funktionierten
#   → Noah 1 (100%, sollte aktiv sein) blieb auf 0W nach früherem Fehler
#   → Keine Korrektur bei manuellen Änderungen oder vorherigen Blueprint-Bugs
# - Lösung: PHASE 2.5 Korrektur-Loop hinzugefügt
#   → Prüft ALLE Noah in should_be_active
#   → Setzt auf max_output_power wenn aktuell != max
#   → Tracked als released_units + changes_made
# - Robustheit: Korrigiert jetzt automatisch jeden Run
#   → Manuelle Änderungen werden überschrieben
#   → Vorherige Blueprint-Fehler werden ausgebügelt
#   → System konvergiert immer zu korrektem Zustand
#
# v2.19 (2026-04-04)
# - KRITISCHER FIX: Debug-Log Argument-Shift
# - Problem: Listen mit Spaces zerstören shell_command Argument-Positionen
#   → should_be_throttled = ['Noah 3', 'Noah 4']
#   → Als String: '[Noah 3, Noah 4]'
#   → Bash interpretiert als 4 separate Args ([ Noah 3, Noah 4 ])
#   → Alle nachfolgenden Parameter verschoben!
#   → Log zeigt: should_throttled="[Noah", throttled_units="3, Noah", action_type="90"
# - Lösung: Listen als JSON serialisieren
#   → should_throttle: "{{ should_be_throttled | to_json }}"
#   → Ergebnis: '["Noah 3", "Noah 4"]' (ein einzelnes Argument)
#   → Argument-Positionen korrekt
# - Betrifft: should_throttle, should_release, throttled, released
#
# v2.18 (2026-04-04)
# - KRITISCHER FIX: Debug-Call ans Ende verschoben
# - Problem: Debug lief VOR Loadbalancing-Logik
#   → Log zeigte immer "action_type: no_action"
#   → Echte Actions unsichtbar im Log
# - Lösung: Debug-Call ans Ende (vor mode: single)
#   → Logged jetzt NACH allen Actions
#   → action_type zeigt echte Aktion (loadbalancing/release/dtu_solar etc.)
# - Fehlende initial variables hinzugefügt:
#   → full_count, noah_status, noah_status_html, noah_status_markdown
#   → Verhindert undefined errors in Telegram-Actions
#
# v2.17 (2026-04-03)
# - KRITISCHER FIX: Template undefined errors
# - Problem 1: Debug-Call (Zeile 596) läuft VOR action_type gesetzt wird
#   → Template error "action_type is undefined"
# - Problem 2: trigger.entity_id ist bei numeric_state/DTU-Triggern leer
#   → Log zeigt "trigger: ''"
# - Lösung 1: Initial Variables Block am Anfang
#   → action_type, throttled_units, released_units etc. auf defaults
#   → Verhindert undefined errors im Debug-Call
# - Lösung 2: trigger mit fallback
#   → "{{ trigger.id ~ ': ' ~ (trigger.entity_id | default('N/A')) }}"
#   → Log zeigt jetzt z.B. "noah_soc_change: sensor.noah_ol_total_battery_soc"
# - action_type Parameter zum Debug-Call hinzugefügt (fehlte)
#
# v2.16 (2026-04-03)
# - KRITISCHER FIX: Globale Release Telegram-Spam
# - Problem: Globale Release setzte ALLE Noah auf max_power ohne Power-Check
#   → Bei allen SOC < min_soc: Jede SOC-Änderung triggert set_value
#   → changes_made immer true → Telegram-Spam
# - Lösung: Power-Check im Globalen Release Loop
